name: chaudhary_traders
description: A production-ready Android application for a snack distribution business.
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  path: ^1.9.0
  intl: ^0.20.2
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.3
  share_plus: ^10.0.0
  fl_chart: ^0.69.0
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
