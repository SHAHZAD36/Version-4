name: Build Chaudhary Traders APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/chaudhary/traders
          printf 'package com.chaudhary.traders\nimport io.flutter.embedding.android.FlutterActivity\nclass MainActivity: FlutterActivity()' > android/app/src/main/kotlin/com/chaudhary/traders/MainActivity.kt

      - name: Fix AndroidManifest
        run: |
          mkdir -p android/app/src/main
          printf '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application android:label="Chaudhary Traders" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">\n        <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">\n            <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>\n        <meta-data android:name="flutterEmbedding" android:value="2"/>\n    </application>\n</manifest>' > android/app/src/main/AndroidManifest.xml

      - name: Create App Icons
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$dir
          done
          # Use icon from assets if exists, else create default
          if [ -f "assets/icons/icon.png" ]; then
            convert assets/icons/icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert assets/icons/icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert assets/icons/icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert assets/icons/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert assets/icons/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          else
            convert -size 192x192 xc:#2E7D32 -fill white -gravity Center \
              -pointsize 60 -annotate 0 "CT" \
              android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            for dir in mdpi hdpi xhdpi xxhdpi; do
              cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
                 android/app/src/main/res/mipmap-$dir/ic_launcher.png
            done
          fi
          echo "Icons created!"

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Chaudhary-Traders-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
