name: Build Chaudhary Traders APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Navigate to correct directory and fix MainActivity
        run: |
          cd android_FRESH/android_fresh
          mkdir -p android/app/src/main/kotlin/com/chaudhary/traders
          printf 'package com.chaudhary.traders\nimport io.flutter.embedding.android.FlutterActivity\nclass MainActivity: FlutterActivity()' > android/app/src/main/kotlin/com/chaudhary/traders/MainActivity.kt

      - name: Fix AndroidManifest v2 Embedding
        run: |
          cd android_FRESH/android_fresh
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          cat > $MANIFEST << 'XMLEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.USE_BIOMETRIC"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <application
                  android:label="Chaudhary Traders"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          XMLEOF
          echo "AndroidManifest fixed!"
          cat $MANIFEST

      - name: Install dependencies
        run: |
          cd android_FRESH/android_fresh
          flutter clean
          flutter pub get

      - name: Build Release APK
        run: |
          cd android_FRESH/android_fresh
          flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cd android_FRESH/android_fresh
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/Chaudhary_Traders_v${{ github.run_number }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Chaudhary-Traders-APK
          path: android_FRESH/android_fresh/build/app/outputs/flutter-apk/Chaudhary_Traders_v${{ github.run_number }}.apk
          if-no-files-found: error
          retention-days: 7
